<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Matilde V. Accesorios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FAFAFA; }
        .fuente-marca { font-family: 'Playfair Display', serif; }
        .bg-kraft { background-color: #D2B48C; } 
    </style>
</head>
<body class="font-sans text-gray-800">

    <header class="bg-kraft text-black py-12 px-4 text-center shadow-lg relative overflow-hidden">
        <div class="absolute opacity-10 top-0 left-0 w-full h-full" style="background-image: url('https://www.transparenttextures.com/patterns/cardboard.png');"></div>
        <h1 class="text-5xl md:text-6xl font-black mb-2 fuente-marca italic tracking-wider relative z-10">Matilde V.</h1>
        <p class="text-xl uppercase tracking-[0.3em] font-light relative z-10">Accesorios</p>
    </header>

    <main class="max-w-6xl mx-auto p-6 my-8">
        <div id="mensaje-carga" class="text-center text-gray-400 py-10 text-xl font-bold animate-pulse">
            <i class="fa-solid fa-spinner fa-spin text-3xl mb-4 block text-[#D2B48C]"></i>
            Preparando la vidriera...
        </div>
        <div id="grilla-productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 hidden">
            </div>
    </main>

    <footer class="text-center py-10 text-gray-400 text-sm mt-10 border-t border-gray-200">
        <p class="fuente-marca text-lg italic mb-2">Hecho a mano con dedicación.</p>
        <p>&copy; 2026 Matilde V. Accesorios. Todos los derechos reservados.</p>
    </footer>

    <script src="tienda.js"></script>
</body>
</html>
